name: PriceWatch

on:
  schedule:
    - cron: "0 * * * *"   # hourly, on the hour (UTC). GitHub may delay during peak load.
  workflow_dispatch: {}    # adds a manual "Run workflow" button for instant checks

# Allow the job to commit the updated state.json back to the repo.
permissions:
  contents: write

# Never run two checks at once (they'd race on state.json).
concurrency:
  group: pricewatch
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check prices and post drops
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python check_once.py

      - name: Persist price state
        run: |
          if [[ -n "$(git status --porcelain state.json)" ]]; then
            git config user.name "pricewatch-bot"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add state.json
            git commit -m "Update price state [skip ci]"
            git push
          else
            echo "No state change to commit."
          fi
